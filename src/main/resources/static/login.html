<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 中公网校督学系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border-radius: 16px;
        }
        .login-header {
            background: #0d6efd;
            border-radius: 16px 16px 0 0;
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .login-body {
            padding: 2rem;
            background: white;
            border-radius: 0 0 16px 16px;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
        }
        .btn-login {
            background: #0d6efd;
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            background: #0b5ed7;
        }
        .register-hint {
            border: 2px dashed #ffc107;
            border-radius: 8px;
            padding: 1rem;
            background: #fffde7;
        }
        .system-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="system-title mb-1">
                <i class="bi bi-mortarboard-fill"></i> 中公网校督学系统
            </div>
            <div class="small opacity-75">多人协作 · 智能督学</div>
        </div>
        <div class="login-body">

            <!-- 登录表单（系统已有账号时显示） -->
            <div id="loginPanel">
                <h5 class="mb-4 text-center"><i class="bi bi-person-lock"></i> 用户登录</h5>
                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="loginUsername"
                                   placeholder="请输入用户名" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="loginPassword"
                                   placeholder="请输入密码" required autocomplete="current-password">
                        </div>
                    </div>
                    <div class="mb-3" id="loginError" style="display:none;">
                        <div class="alert alert-danger py-2 mb-0 small"></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login w-100 py-2" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right"></i> 登 录
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="#" onclick="showRegister()" class="small text-muted">
                        <i class="bi bi-question-circle"></i> 还没有账号？注册管理员
                    </a>
                </div>
            </div>

            <!-- 注册表单（系统无账号时显示） -->
            <div id="registerPanel" style="display:none;">
                <div class="register-hint mb-3">
                    <div class="small text-warning fw-bold mb-1">
                        <i class="bi bi-info-circle"></i> 系统尚未设置管理员
                    </div>
                    <div class="small text-muted mb-0">
                        请注册第一个管理员账号。后续所有账号由管理员创建。
                    </div>
                </div>
                <h5 class="mb-4 text-center"><i class="bi bi-shield-lock"></i> 注册管理员</h5>
                <form id="registerForm" onsubmit="return handleRegister(event)">
                    <div class="mb-3">
                        <label class="form-label">管理员用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="regUsername"
                                   placeholder="设置用户名" required minlength="3">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">设置密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="regPassword"
                                   placeholder="至少6位密码" required minlength="6" autocomplete="new-password">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="regPassword2"
                                   placeholder="再次输入密码" required minlength="6">
                        </div>
                    </div>
                    <div class="mb-3" id="regError" style="display:none;">
                        <div class="alert alert-danger py-2 mb-0 small"></div>
                    </div>
                    <button type="submit" class="btn btn-warning btn-login w-100 py-2" id="registerBtn">
                        <i class="bi bi-check-circle"></i> 创建管理员并登录
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="#" onclick="showLogin()" class="small text-muted">
                        <i class="bi bi-arrow-left"></i> 返回登录
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
